    - 'BDIII'
    - 'ISI'
    - 'ESS'
    - 'SSS'
    - 'STOPBANG'
    - 'BQ'
    - 'HTN'
    - 'DM'
    - 'DL'
    - 'Liver'
    - 'Kidney'
    - 'Lung'
    - 'IHD'
    - 'CHF'
    - 'Arrythmia'
    - 'Cancer'
    - 'Thyroid'
    - 'Rhinitis'
    - 'CTD'
    - 'Epilepsy'
    - 'CVA'
    - 'Dementia'
    - 'PSY'
    - 'OSA_op'
    - 'REM_Episodes'
    - 'TST'
    - 'Total_Stage_N1_ratio'
    - 'Total_Stage_N2_ratio'
    - 'Total_Stage_N3_ratio'
    - 'Total_Stage_R_ratio'
    - 'WASO'
    - 'Sleep_latency'
    - 'REM_sleep_latency'
    - 'Sleep_Efficiency'
    - 'Arousal_index'
    - 'AHI'
