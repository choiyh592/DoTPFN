    - 'Min_O2_REM'
    - 'HRV_NREM'
    - 'HRV_REM'
    - 'CCI'

training:
  epochs: 100
  steps_per_epoch: 25
  patience: 15
  lr: 0.0001
  weight_decay: 0.001
  model_save_dir: "/home/won_ju_kim/yhchoi/PSG_260408/pfn_exp_pt_260521"
  log_save_path: "/home/won_ju_kim/yhchoi/PSG_260408/pfn_exp_pt_260521/logs/results.csv"
  k_folds: 5
  
  # For regularized pretraining alignment (MSE on Cross-Attention weights)
  pretrained_image_dir: null 
  lambda_reg: 0.75

model:
  doc_input_dim: 128
  doc_embed_dim: 128
  doc_num_heads: 8
  d_model: 256
  num_heads: 4
  dropout: 0.2
