# Config for Multimodal Training (DoTPFN)
model_type: "multimodal"
device: "cuda"

data:
  csv_path: "/home/won_ju_kim/yhchoi/PSG_260408/final_combined_data.csv"
  patient_id_col: "ID"
  labels:
    - "adherence_3m"
    - "adherence_6m"
    - "adherence_9m"
    - "adherence_1yr"
    - "adherence_2yr"
    - "adherence_3yr"
    - "adherence_4yr"
    - "adherence_5yr"
